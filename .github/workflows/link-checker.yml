name: "Link Checker"

on:
  push:
    branches:
      - main
    paths:
      - "**/*.md"
  pull_request:
    paths:
      - "**/*.md"
  schedule:
    # Run every Monday at 08:00 UTC
    - cron: "0 8 * * 1"
  workflow_dispatch:

permissions:
  contents: read
  issues: write
  pull-requests: write

jobs:
  link-check:
    name: "Check Links"
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Check links in markdown files
        uses: lycheeverse/lychee-action@v2.8.0
        with:
          args: |
            --verbose
            --no-progress
            --accept 200,204,206,301,302,403,429,999
            --exclude-loopback
            --exclude "^mailto:"
            --exclude "^https://github\.com/HermannDj/aws-portfolio/actions"
            **/*.md
          fail: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Create issue on broken links (scheduled run only)
        if: failure() && github.event_name == 'schedule'
        uses: actions/github-script@v8
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const title = '🔗 Broken links detected in documentation';
            const body = [
              '## Broken Links Detected',
              '',
              'The scheduled link checker found broken links in the repository documentation.',
              '',
              `**Workflow run:** ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}`,
              '',
              'Please review and fix the broken links.'
            ].join('\n');

            // Check for existing open issue with same title to avoid duplicates
            const { data: issues } = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: 'open',
              labels: 'broken-links'
            });

            const existing = issues.find(i => i.title === title);
            if (!existing) {
              await github.rest.issues.create({
                owner: context.repo.owner,
                repo: context.repo.repo,
                title,
                body,
                labels: ['broken-links', 'documentation']
              });
            }
