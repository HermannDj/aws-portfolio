name: "Architect Blueprint — Terraform CI/CD"

on:
  pull_request:
    paths:
      - "projects/architect-blueprint/**"
  push:
    branches:
      - main
    paths:
      - "projects/architect-blueprint/**"
  workflow_dispatch:

permissions:
  id-token: write   # Required for OIDC authentication with AWS
  contents: read
  pull-requests: write

env:
  TF_WORKING_DIR: projects/architect-blueprint
  AWS_REGION: us-east-1

jobs:
  # ─────────────────────────────────────────────────────────────────────────────
  # Job 1: Validate — format check, init, validate, tflint
  # ─────────────────────────────────────────────────────────────────────────────
  validate:
    name: "Validate"
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ${{ env.TF_WORKING_DIR }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "~> 1.7"

      - name: Terraform Format Check
        run: terraform fmt -check -recursive

      - name: Terraform Init (no backend)
        run: terraform init -backend=false

      - name: Terraform Validate
        run: terraform validate

      - name: Setup TFLint
        uses: terraform-linters/setup-tflint@v6
        with:
          tflint_version: latest

      - name: Run TFLint
        run: |
          tflint --init
          tflint --recursive

      - name: Run Checkov (soft-fail on HIGH severity)
        uses: bridgecrewio/checkov-action@v12
        with:
          directory: ${{ env.TF_WORKING_DIR }}
          framework: terraform
          soft_fail_on: HIGH
          output_format: github_failed_only

  # ─────────────────────────────────────────────────────────────────────────────
  # Job 2: Security Scan — checkov + trivy in parallel
  # ─────────────────────────────────────────────────────────────────────────────
  security-scan:
    name: "Security Scan"
    runs-on: ubuntu-latest
    needs: validate

    strategy:
      matrix:
        scanner: [checkov, trivy]
      fail-fast: false

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Run Checkov
        if: matrix.scanner == 'checkov'
        uses: bridgecrewio/checkov-action@v12
        with:
          directory: ${{ env.TF_WORKING_DIR }}
          framework: terraform
          output_format: sarif
          output_file_path: checkov-results.sarif

      - name: Run Trivy
        if: matrix.scanner == 'trivy'
        uses: aquasecurity/trivy-action@0.34.2
        with:
          scan-type: config
          scan-ref: ${{ env.TF_WORKING_DIR }}
          format: sarif
          output: trivy-results.sarif
          exit-code: "0"
          version: latest

  # ─────────────────────────────────────────────────────────────────────────────
  # Job 3: Plan — Terraform plan with AWS OIDC authentication
  # ─────────────────────────────────────────────────────────────────────────────
  plan-prod:
    name: "Terraform Plan (prod)"
    runs-on: ubuntu-latest
    needs: [validate, security-scan]
    environment: production
    defaults:
      run:
        working-directory: ${{ env.TF_WORKING_DIR }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure AWS credentials via OIDC
        uses: aws-actions/configure-aws-credentials@v6
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}
          role-session-name: terraform-plan-${{ github.run_id }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "~> 1.7"

      - name: Terraform Init
        run: |
          terraform init \
            -backend-config="bucket=${{ secrets.TF_STATE_BUCKET }}" \
            -backend-config="dynamodb_table=${{ secrets.TF_LOCK_TABLE }}"

      - name: Terraform Plan
        id: plan
        run: |
          terraform plan \
            -var="environment=prod" \
            -out=tfplan \
            -no-color 2>&1 | tee plan-output.txt
        continue-on-error: true

      - name: Upload plan artifact
        uses: actions/upload-artifact@v4
        with:
          name: tfplan-${{ github.run_id }}
          path: ${{ env.TF_WORKING_DIR }}/tfplan
          retention-days: 5

      - name: Comment plan on PR
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v8
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const fs = require('fs');
            const planFile = '${{ env.TF_WORKING_DIR }}/plan-output.txt';
            if (!fs.existsSync(planFile)) {
              console.log('plan-output.txt not found, skipping PR comment');
              return;
            }
            const planOutput = fs.readFileSync(planFile, 'utf8');
            const truncated = planOutput.length > 60000 ? planOutput.slice(-60000) + '\n\n... (truncated)' : planOutput;
            const body = `## 📋 Terraform Plan — \`prod\`\n\`\`\`hcl\n${truncated}\n\`\`\``;
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body,
            });

      - name: Check plan status
        if: steps.plan.outcome == 'failure'
        run: exit 1

  # ─────────────────────────────────────────────────────────────────────────────
  # Job 4: Apply — only on main branch via manual workflow_dispatch
  # ─────────────────────────────────────────────────────────────────────────────
  apply:
    name: "Terraform Apply (prod)"
    runs-on: ubuntu-latest
    needs: plan-prod
    environment: production
    if: github.ref == 'refs/heads/main' && github.event_name == 'workflow_dispatch'
    defaults:
      run:
        working-directory: ${{ env.TF_WORKING_DIR }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure AWS credentials via OIDC
        uses: aws-actions/configure-aws-credentials@v6
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}
          role-session-name: terraform-apply-${{ github.run_id }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "~> 1.7"

      - name: Terraform Init
        run: |
          terraform init \
            -backend-config="bucket=${{ secrets.TF_STATE_BUCKET }}" \
            -backend-config="dynamodb_table=${{ secrets.TF_LOCK_TABLE }}"

      - name: Download plan artifact
        uses: actions/download-artifact@v4
        with:
          name: tfplan-${{ github.run_id }}
          path: ${{ env.TF_WORKING_DIR }}

      - name: Terraform Apply
        run: terraform apply -auto-approve tfplan

  # ─────────────────────────────────────────────────────────────────────────────
  # Job 5: Notify — send notification on workflow failure
  # ─────────────────────────────────────────────────────────────────────────────
  notify-failure:
    name: "Notify on Failure"
    runs-on: ubuntu-latest
    needs: [validate, security-scan, plan-prod]
    if: failure()

    steps:
      - name: Workflow failure summary
        run: |
          echo "::error::Workflow '${{ github.workflow }}' failed on branch '${{ github.ref_name }}'"
          echo "Run URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
