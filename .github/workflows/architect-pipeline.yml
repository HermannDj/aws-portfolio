name: Architect Pipeline

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  format_validate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v2

      - name: Terraform fmt
        run: terraform fmt -check

      - name: Terraform init
        run: terraform init -backend=false

      - name: Terraform validate
        run: terraform validate

      - name: TFLint
        run: tflint

      - name: Checkov
        run: checkov -d .

  plan:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v2

      - name: Terraform init
        run: terraform init -backend=false

      - name: Terraform plan
        run: terraform plan

  workflow_dispatch:
    secrets:
      AWS_ROLE_ARN: ${{ secrets.AWS_ROLE_ARN }}
      region: ca-central-1