name: "Architect Blueprint — Terraform CI"

on:
  pull_request:
    paths:
      - "projects/architect-blueprint/**"
      - ".github/workflows/architect-pipeline.yml"
  push:
    branches: [main]
    paths:
      - "projects/architect-blueprint/**"
      - ".github/workflows/architect-pipeline.yml"
  workflow_dispatch:

permissions:
  contents: read
  pull-requests: write
  id-token: write

env:
  TF_WORKING_DIR: projects/architect-blueprint
  AWS_REGION: ca-central-1
  TF_VERSION: "~> 1.7"

jobs:
  validate:
    name: "Validate / Lint / Scan"
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ${{ env.TF_WORKING_DIR }}

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - name: Terraform fmt (check)
        run: terraform fmt -check -recursive

      - name: Terraform init (no backend)
        run: terraform init -backend=false

      - name: Terraform validate
        run: terraform validate

      - name: Setup TFLint
        uses: terraform-linters/setup-tflint@v6

      - name: Run TFLint
        run: |
          tflint --init
          tflint --recursive

      - name: Checkov (soft-fail on HIGH)
        uses: bridgecrewio/checkov-action@v12
        with:
          directory: ${{ env.TF_WORKING_DIR }}
          framework: terraform
          soft_fail_on: HIGH
          output_format: github_failed_only

      - name: Trivy (config scan) - do not fail build
        uses: aquasecurity/trivy-action@0.34.2
        with:
          scan-type: config
          scan-ref: ${{ env.TF_WORKING_DIR }}
          exit-code: "0"
          version: latest

  plan:
    name: "Terraform plan (manual)"
    runs-on: ubuntu-latest
    needs: validate
    if: github.event_name == 'workflow_dispatch'
    defaults:
      run:
        working-directory: ${{ env.TF_WORKING_DIR }}

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v6
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}
          role-session-name: terraform-plan-${{ github.run_id }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - name: Terraform init
        run: terraform init

      - name: Terraform plan
        run: terraform plan -no-color
