name: Architect Pipeline

on:
  push:
    paths:
      - projects/serverless-api/**
      - projects/eks-blueprint/**
  pull_request:
    paths:
      - projects/serverless-api/**
      - projects/eks-blueprint/**

jobs:
  Terraform:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        working-dir: 
          - projects/serverless-api
          - projects/eks-blueprint

    steps:
      - name: Checkout code
        uses: actions/checkout@v2

      - name: Set up AWS credentials
        uses: aws-actions/configure-aws-credentials@v1
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ca-central-1

      - name: Terraform fmt
        run: |
          cd ${{ matrix.working-dir }}
          terraform fmt -check

      - name: Terraform validate
        run: |
          cd ${{ matrix.working-dir }}
          terraform validate

      - name: TFLint
        run: |
          cd ${{ matrix.working-dir }}
          tflint

      - name: Checkov
        run: |
          cd ${{ matrix.working-dir }}
          checkov -d .

      - name: Trivy
        run: |
          cd ${{ matrix.working-dir }}
          trivy fs .

      - name: Terraform init
        run: |
          cd ${{ matrix.working-dir }}
          terraform init

      - name: Terraform plan
        run: |
          cd ${{ matrix.working-dir }}
          terraform plan

      - name: Terraform apply
        run: |
          cd ${{ matrix.working-dir }}
          terraform apply -auto-approve
        env:
          TF_VAR_region: ca-central-1
