name: Feature Request
description: Suggest a new feature or improvement for the infrastructure
title: "[Feature]: "
labels: ["enhancement", "needs-triage"]
assignees:
  - HermannDj

body:
  - type: markdown
    attributes:
      value: |
        Thanks for suggesting a new feature! Please describe your idea in detail below.

  - type: textarea
    id: summary
    attributes:
      label: Feature Summary
      description: A clear and concise description of the feature you'd like to see.
      placeholder: Briefly describe the feature.
    validations:
      required: true

  - type: textarea
    id: problem
    attributes:
      label: Problem Statement
      description: What problem does this feature solve? What is the current limitation?
      placeholder: Describe the problem or limitation you're experiencing.
    validations:
      required: true

  - type: textarea
    id: solution
    attributes:
      label: Proposed Solution
      description: Describe the solution you'd like.
      placeholder: How should this feature be implemented?
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives Considered
      description: Describe any alternative solutions or features you've considered.
    validations:
      required: false

  - type: dropdown
    id: scope
    attributes:
      label: Scope
      description: Which part of the infrastructure does this feature affect?
      options:
        - Networking (VPC, subnets, routing)
        - EKS (Kubernetes cluster)
        - Aurora (database)
        - CDN / WAF (CloudFront)
        - Security (GuardDuty, Security Hub, CloudTrail)
        - CI/CD (GitHub Actions workflows)
        - Documentation
        - Other
    validations:
      required: true

  - type: textarea
    id: additional
    attributes:
      label: Additional Context
      description: Any other context, diagrams, or information that might be helpful.
    validations:
      required: false
