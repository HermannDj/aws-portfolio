name: Bug Report
description: Report a bug or unexpected behavior in the infrastructure code
title: "[Bug]: "
labels: ["bug", "needs-triage"]
assignees:
  - HermannDj

body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to report a bug! Please fill out the form below to help us investigate.

  - type: textarea
    id: description
    attributes:
      label: Bug Description
      description: A clear and concise description of the bug.
      placeholder: Describe what happened and what you expected to happen.
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Steps to Reproduce
      description: Step-by-step instructions to reproduce the issue.
      placeholder: |
        1. Run `terraform plan` with ...
        2. See error ...
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected Behavior
      description: What did you expect to happen?
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: Actual Behavior
      description: What actually happened? Include error messages and logs.
    validations:
      required: true

  - type: input
    id: terraform_version
    attributes:
      label: Terraform Version
      placeholder: "e.g., 1.7.5"
    validations:
      required: false

  - type: input
    id: aws_provider_version
    attributes:
      label: AWS Provider Version
      placeholder: "e.g., 5.40.0"
    validations:
      required: false

  - type: dropdown
    id: environment
    attributes:
      label: Environment
      options:
        - prod
        - staging
        - dev
        - local
    validations:
      required: false

  - type: textarea
    id: additional
    attributes:
      label: Additional Context
      description: Any other context, screenshots, or information that might be helpful.
    validations:
      required: false
