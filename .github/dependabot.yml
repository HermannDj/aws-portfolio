version: 2

updates:
  # Monitor GitHub Actions for updates
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
    labels:
      - "dependencies"
      - "github-actions"
    reviewers:
      - "HermannDj"
    commit-message:
      prefix: "chore(deps)"

  # Monitor Terraform providers and modules
  - package-ecosystem: "terraform"
    directory: "/projects/architect-blueprint"
    schedule:
      interval: "weekly"
      day: "monday"
    labels:
      - "dependencies"
      - "terraform"
    reviewers:
      - "HermannDj"
    commit-message:
      prefix: "chore(deps)"
